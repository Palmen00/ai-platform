services:
  frontend:
    build:
      context: ../frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:8000}
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ../backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_NAME: ${APP_NAME:-Local AI OS}
      DATA_ROOT: /app/data
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_DEFAULT_MODEL: ${OLLAMA_DEFAULT_MODEL:-llama3.2:3b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      OLLAMA_EMBED_BATCH_SIZE: ${OLLAMA_EMBED_BATCH_SIZE:-8}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-document_chunks}
      RETRIEVAL_LIMIT: ${RETRIEVAL_LIMIT:-4}
      RETRIEVAL_MIN_SCORE: ${RETRIEVAL_MIN_SCORE:-0.45}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      DOCUMENT_CHUNK_SIZE: ${DOCUMENT_CHUNK_SIZE:-1000}
      DOCUMENT_CHUNK_OVERLAP: ${DOCUMENT_CHUNK_OVERLAP:-150}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-change-me}
      ADMIN_SESSION_TTL_HOURS: ${ADMIN_SESSION_TTL_HOURS:-12}
      SAFE_MODE: ${SAFE_MODE:-false}
      LOW_IMPACT_MODE: ${LOW_IMPACT_MODE:-false}
      GLINER_ENABLED: ${GLINER_ENABLED:-true}
      OCR_ENABLED: ${OCR_ENABLED:-true}
      OCR_LANGUAGE: ${OCR_LANGUAGE:-eng+swe}
      OCRMYPDF_ENABLED: ${OCRMYPDF_ENABLED:-true}
      OCRMYPDF_USE_DOCKER: ${OCRMYPDF_USE_DOCKER:-true}
      OCRMYPDF_DOCKER_IMAGE: ${OCRMYPDF_DOCKER_IMAGE:-local-ai-ocrmypdf:latest}
      OCRMYPDF_AUTO_BUILD: ${OCRMYPDF_AUTO_BUILD:-true}
    volumes:
      - ${DATA_ROOT_HOST:-../data}:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - qdrant
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - ${QDRANT_STORAGE_HOST:-../data/qdrant}:/qdrant/storage
    restart: unless-stopped
