apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-ai-os-backend
  labels:
    app: local-ai-os
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: local-ai-os
      component: backend
  template:
    metadata:
      labels:
        app: local-ai-os
        component: backend
    spec:
      containers:
        - name: backend
          image: local-ai-os/backend:0.1.0-rc4
          ports:
            - containerPort: 8000
          env:
            - name: AUTH_ENABLED
              value: "true"
            - name: SAFE_MODE
              value: "false"
            - name: LOW_IMPACT_MODE
              value: "true"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
